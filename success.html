<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Success</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>✅ Payment Successful!</h1>
<p id="msg"></p>
<button onclick="goHome()">Back to Store 🏠</button>

<script>
let method = localStorage.getItem("paymentMethod");
let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("msg").innerText = 
`You paid ₹${cart.reduce((sum,i)=>sum+i.price*i.qty,0)} using ${method}.`;

function goHome(){
  localStorage.removeItem("cart"); // Empty cart after payment
  window.location.href = "index.html";
}
</script>
</body>
</html>
