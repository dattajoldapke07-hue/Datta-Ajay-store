<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Success</title>
<link rel="stylesheet" href="style.css">
<style>
  body { text-align: center; padding-top: 50px; font-family: Arial; }
  .success-card { background: white; color: #333; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .view-btn { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
  .home-btn { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
</style>
</head>
<body>

  <div class="success-card">
    <h1 style="color: #28a745;">✅ Order Placed!</h1>
    <p>Aapka order successfully receive ho gaya hai.</p>
    <button class="view-btn" onclick="location.href='admin.html'">📊 View All Orders (Admin)</button>
    <button class="home-btn" onclick="goHome()">🏠 Back to Store</button>
  </div>

<script>
  // Data nikalna
  let method = localStorage.getItem("paymentMethod");
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);

  // Admin ke liye order save karna
  if (cart.length > 0) {
    let allOrders = JSON.parse(localStorage.getItem("allOrders")) || [];
    let newOrder = {
      id: "#ORD" + Math.floor(Math.random() * 10000),
      date: new Date().toLocaleString(),
      items: cart,
      total: total,
      payment: method
    };
    allOrders.push(newOrder);
    localStorage.setItem("allOrders", JSON.stringify(allOrders));
  }

  function goHome() {
    localStorage.removeItem("cart"); 
    window.location.href = "index.html";
  }
</script>
</body>
</html>
