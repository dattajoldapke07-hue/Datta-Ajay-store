<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Success</title>
<link rel="stylesheet" href="style.css">
<style>
  body { text-align: center; padding-top: 50px; }
  .success-card {
    background: white; color: #333; padding: 40px;
    border-radius: 20px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .btn-group { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
  button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  .view-btn { background: #007bff; color: white; }
  .home-btn { background: #28a745; color: white; }

  /* Bill Modal Style */
  #billModal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
  }
  .bill-content {
    background: white; color: #333; margin: 5% auto; padding: 20px;
    width: 90%; max-width: 400px; border-radius: 15px; text-align: left;
    font-family: 'Courier New', Courier, monospace; /* Invoice look */
  }
  .bill-header { border-bottom: 2px dashed #333; padding-bottom: 10px; margin-bottom: 10px; text-align: center; }
  .item-row { display: flex; justify-content: space-between; margin: 5px 0; }
  .total-row { border-top: 2px dashed #333; margin-top: 10px; padding-top: 10px; font-weight: bold; font-size: 1.2rem; }
</style>
</head>
<body>

  <div class="success-card">
    <h1 style="color: #28a745;">✅ Order Placed!</h1>
    <p>Aapka order successfully receive ho gaya hai.</p>
    
    <div class="btn-group">
      <button class="view-btn" onclick="showBill()">📄 View Bill</button>
      <button class="home-btn" onclick="goHome()">🏠 Back to Store</button>
    </div>
  </div>

  <div id="billModal">
    <div class="bill-content">
      <div class="bill-header">
        <h2>INVOICE</h2>
        <p>Datta & Ajay's Store</p>
        <p id="orderDate"></p>
      </div>
      
      <div id="itemsList"></div>
      
      <div class="total-row">
        <span>GRAND TOTAL:</span>
        <span id="billTotal"></span>
      </div>
      
      <p style="margin-top: 15px;">Payment: <b id="payMethod"></b></p>
      <p style="text-align: center; font-size: 0.8rem; margin-top: 20px;">--- Thank You for Shopping! ---</p>
      
      <button onclick="closeBill()" style="width: 100%; margin-top: 10px; background: #333; color: white;">Close</button>
    </div>
  </div>

<script>
  let method = localStorage.getItem("paymentMethod");
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function showBill() {
    const list = document.getElementById("itemsList");
    list.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
      let subtotal = item.price * item.qty;
      total += subtotal;
      list.innerHTML += `
        <div class="item-row">
          <span>${item.name} (x${item.qty})</span>
          <span>₹${subtotal}</span>
        </div>`;
    });

    document.getElementById("billTotal").innerText = "₹" + total;
    document.getElementById("payMethod").innerText = method;
    document.getElementById("orderDate").innerText = "Date: " + new Date().toLocaleDateString();
    document.getElementById("billModal").style.display = "block";
  }

  function closeBill() {
    document.getElementById("billModal").style.display = "none";
  }

  function goHome() {
    localStorage.removeItem("cart"); 
    window.location.href = "index.html";
  }
</script>
</body>
</html>
</script>
</body>
</html>
