<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D E-Commerce Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 3D Intro Screen -->
<div id="intro">
 <!-- LOGIN PAGE -->
<div id="login-page">
  <div class="login-box">
    <h2>Login</h2>

    <input type="text" id="mobile" placeholder="Enter Mobile Number"><br><br>
    <button onclick="sendOTP()">Send OTP</button>

    <div id="otp-section" style="display:none;">
      <input type="text" id="otp" placeholder="Enter OTP"><br><br>
      <button onclick="verifyOTP()">Login</button>
    </div>

    <p id="error-msg"></p>
  </div>
</div>
  <h1 class="logo">🛍️ Datta & Ajay's Store</h1>
</div>

<header>
  <h1> My E-Commerce Store</h1>

  <!-- ADD -->
  <input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">
  <button onclick="toggleDark()">🌙</button>
  <button onclick="viewWishlist()">❤️ Wishlist</button>
  <button onclick="viewCart()">🛒 Cart (<span id="cart-count">00</span>)</button>
</header>

<section id="products"></section>

<!-- Cart -->
<div id="cart-modal" class="hidden">
  <div id="wishlist-modal" class="hidden">
  <h2>Your Wishlist ❤️</h2>
  <ul id="wishlist-items"></ul>
  <button onclick="closeWishlist()">Close</button>
</div>
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₹<span id="total">00</span></h3>
  <button onclick="checkout()">Checkout</button>
  <button onclick="closeCart()">Close</button>
</div>

<!-- Payment -->
<div id="payment-modal" class="hidden">
  <h2>Payment</h2>
  <input placeholder="Card Number"><br><br>
  <input placeholder="Name"><br><br>
  <input placeholder="CVV"><br><br>
  <button onclick="confirmPayment()">Pay Now</button>
</div>

<!-- Order -->
<div id="order-box" class="hidden"></div>

<script src="script.js"></script>
</body>
  <div id="admin-panel" class="hidden">
  <h2>Admin Panel 👑</h2>

  <input id="pname" placeholder="Product Name"><br><br>
  <input id="pprice" placeholder="Price"><br><br>
  <input id="pimg" placeholder="Image URL"><br><br>

  <button onclick="addProduct()">Add Product</button>
    <h3>Manage Products 🛠</h3>
<ul id="admin-product-list"></ul>
<button onclick="loadAdminProducts()">Refresh List</button>
  <button onclick="closeAdmin()">Close</button>
</div>
</html>
