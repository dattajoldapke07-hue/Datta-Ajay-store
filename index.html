<html lang="en">
<head>
<meta charset="UTF-8">

<title>🛍️ Datta & Ajay's Store</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Header styling for Admin link */
  header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(5px);
    align-items: center;
    color: white;
  }
  .admin-link {
    font-size: 12px;
    color: #ccc;
    text-decoration: none;
    margin-right: 15px;
    border: 1px solid #555;
    padding: 2px 5px;
    border-radius: 4px;
  }
  .admin-link:hover { color: white; border-color: white; }
  
  header button {
    margin-left: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }
  #products { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
  .product { 
    background: white; color: #333; margin: 15px; padding: 15px; 
    width: 220px; border-radius: 15px; text-align: center; 
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }
  .product img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; }
</style>
</head>
