<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta & Ajay Store</title>
<style>
  body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb); min-height: 100vh; }
  
  /* Header Fix: Buttons line mein aane ke liye */
  header {
    display: flex;
    flex-direction: column; /* Mobile par logo upar, buttons niche */
    align-items: center;
    padding: 15px;
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    color: white;
    gap: 10px;
  }

  /* Desktop par line mein dikhega */
  @media (min-width: 600px) {
    header { flex-direction: row; justify-content: space-between; }
  }

  header h1 { margin: 0; font-size: 1.5rem; text-align: center; }

  .nav-buttons {
    display: flex;
    flex-wrap: wrap; /* Jagah kam hone par buttons niche shift honge line mein */
    justify-content: center;
    gap: 8px;
  }

  .nav-buttons a, .nav-buttons button {
    text-decoration: none;
  }

  header button, .admin-btn {
    background: white;
    color: #333;
    border: none;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .admin-btn { background: #333; color: white; border: 1px solid #555; }

  header button:hover { transform: translateY(-2px); background: #eee; }

  #products { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
  .product { 
    background: white; color: #333; margin: 10px; padding: 15px; 
    width: 160px; border-radius: 15px; text-align: center; 
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }
  .product img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; }
</style>
</head>
<body>

<header>
  <h1>🛒 Datta & Ajay Store</h1>
  
  <div class="nav-buttons">
    <a href="admin.html"><button class="admin-btn">🔑 Admin</button></a>
    <button onclick="toggleDark()">🌙 Dark</button>
    <a href="wishlist.html"><button>❤️ Wishlist</button></a>
    <a href="cart.html"><button>🛒 Cart (<span id="cartCount">0</span>)</button></a>
  </div>
</header>

<section id="products"></section>
