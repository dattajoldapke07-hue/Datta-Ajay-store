<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛍️ Datta & Ajay's Mega Store</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
  :root { --primary: #ff6f61; --secondary: #feb47b; --dark: #1a1a1a; --light: #fdf2f2; --success: #28a745; }
  body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--light); transition: 0.5s; color: #333; overflow-x: hidden; }
  .dark { background: var(--dark); color: white !important; }
  .hidden { display: none !important; }

  header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 15px; color: white; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 10px 0; }
  .btn { background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
  .search-box { width: 85%; padding: 10px 20px; border-radius: 30px; border: none; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

  #products { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
  .product { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
  .product img { width: 100%; height: 150px; object-fit: cover; border-radius: 15px; }
  .wishlist-heart { position: absolute; top: 20px; right: 20px; font-size: 1.2rem; cursor: pointer; color: #ccc; }
  .wishlist-heart.active { color: #ff4757; }
  .add-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }

  /* SIDEBAR FIX */
  .cart-sidebar { 
    position: fixed; top: 0; right: -100%; width: 100%; max-width: 320px; height: 100%; 
    background: white; z-index: 9999; transition: 0.4s; box-shadow: -5px 0 25px rgba(0,0,0,0.2);
    display: flex; flex-direction: column; 
  }
  .cart-sidebar.open { right: 0; }
  .cart-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
  .cart-items-container { flex: 1; overflow-y: auto; padding: 15px; }
  .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #f9f9f9; }

  /* BILL FOOTER */
  .bill-footer { padding: 20px; border-top: 2px solid #eee; background: white; padding-bottom: env(safe-area-inset-bottom, 20px); }
  .bill-info { font-size: 0.8rem; color: #666; margin-bottom: 10px; text-align: left; line-height: 1.4; }
  .order-btn { background: var(--success); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.1rem; }

  #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 10000; display: flex; justify-content: center; align-items: center; }
  .login-box { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 80%; max-width: 300px; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2 style="color:var(--primary);">Welcome! 👋</h2>
    <input type="text" id="userNameInput" style="width:90%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd; text-align:center;" placeholder="Enter Name">
    <button class="add-btn" onclick="saveUser()">Chalein 🛒</button>
  </div>
</div>

<header id="mainHeader" class="hidden">
  <h3 id="welcomeGreeting" style="margin:0;">🛒 Datta & Ajay Store</h3>
  <div class="nav-buttons">
    <button class="btn" onclick="toggleDark()">🌙 Mode</button>
    <button class="btn" onclick="showWishlistPage()">❤️ Wishlist (<span id="wishCount">0</span>)</button>
    <button class="btn" onclick="openCart()" style="background:var(--dark); color:white;">🛒 Cart (<span id="cartCount">0</span>)</button>
  </div>
  <input type="text" id="searchBox" class="search-box" onkeyup="searchItems()" placeholder="Search Products...">
</header>

<main id="mainContent" class="hidden">
  <div id="wishlistHeader" class="hidden" style="text-align:center; padding:10px;">
    <button class="btn" onclick="showAllProducts()" style="background:var(--primary); color:white;">⬅️ Back to Store</button>
  </div>
  <div id="products"></div>
</main>

<div id="cartSidebar" class="cart-sidebar">
  <div class="cart-header">
    <h3 style="margin:0;">My Cart 🛒</h3>
    <button onclick="closeCart()" style="border:none; background:none; font-size:2rem; color:var(--primary); cursor:pointer;">×</button>
  </div>
  <div id="cartItemsList" class="cart-items-container"></div>
  
  <div class="bill-footer">
    <div class="bill-info" id="realBillDetails">
       </div>
    <h3 id="totalBill" style="margin:0 0 10px 0; text-align:center; color:var(--primary);">Total: ₹0</h3>
    
    <select id="payMethod" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; background:#f0f0f0; border:none;">
      <option value="Cash on Delivery">Cash on Delivery (COD)</option>
      <option value="UPI / Online">UPI / Online</option>
    </select>
    <button class="order-btn" onclick="placeOrder()">PLACE ORDER 🚀</button>
  </div>
</div>

<script>
const SERVICE_ID = "service_lduofei"; 
const TEMPLATE_ID = "template_x85ytrq"; 
const PUBLIC_KEY = "mIOgOSr1AjeDPmz8L";
emailjs.init(PUBLIC_KEY);

const products = [
  {id:1, name:"Premium T-Shirt", price:500, image:"https://www.freeiconspng.com/uploads/blank-t-shirt-png-16.jpg"},
  {id:2, name:"Sneaker Shoes", price:1500, image:"https://www.pngall.com/wp-content/uploads/5/Men-Shoes-PNG-Image-File.png"},
  {id:3, name:"Luxury Watch", price:2000, image:"https://i.postimg.cc/66k6BKX7/1805QM04-1.jpg"},
  {id:4, name:"Silk Saree", price:1499, image:"https://i.postimg.cc/jqGQHDzF/IMG-20260325-WA0001.jpg"},
  {id:5, name:"Formal Shirt", price:299, image:"https://i.postimg.cc/L5bHPdY2/IMG-20260328-WA0044.jpg"},
  {id:6, name:"Sunglasses", price:450, image:"https://i.postimg.cc/9FKSqXMf/IMG-20260228-WA0071.jpg"},
  {id:7, name:"Smart Watch", price:3500, image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400"},
  {id:8, name:"Gaming Mouse", price:1200, image:"https://images.unsplash.com/photo-1527814050087-379371549a28?w=400"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

function saveUser() {
  const name = document.getElementById("userNameInput").value.trim();
  if(name) { localStorage.setItem("customerName", name); checkUser(); }
}

function checkUser() {
  const savedName = localStorage.getItem("customerName");
  if(savedName) {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainHeader").classList.remove("hidden");
    document.getElementById("mainContent").classList.remove("hidden");
    document.getElementById("welcomeGreeting").innerText = `Namaste, ${savedName}! 🛒`;
    showStore();
    updateUI();
  }
}

function showStore(items = products){
  const container = document.getElementById("products");
  container.innerHTML = items.map(p => {
    const isWish = wishlist.some(w => w.id === p.id);
    return `<div class="product">
        <span class="wishlist-heart ${isWish ? 'active' : ''}" onclick="toggleWish(${p.id})">❤️</span>
        <img src="${p.image}"> 
        <h4 style="margin:5px 0;">${p.name}</h4> 
        <p style="color:var(--primary); font-weight:bold; margin:0;">₹${p.price}</p> 
        <button class="add-btn" onclick="addToCart(${p.id})">Add</button>
      </div>`;
  }).join('');
}

function updateUI() {
  document.getElementById("cartCount").innerText = cart.length;
  document.getElementById("wishCount").innerText = wishlist.length;
  
  // Real-time Date and Time for Bill
  const now = new Date();
  const dateStr = now.toLocaleDateString();
  const timeStr = now.toLocaleTimeString();
  const orderID = "DA-" + Math.floor(Math.random() * 1000000); // Random Order ID

  document.getElementById("realBillDetails").innerHTML = `
    <b>Order ID:</b> ${orderID}<br>
    <b>Date:</b> ${dateStr}<br>
    <b>Time:</b> ${timeStr}
  `;

  let total = 0;
  document.getElementById("cartItemsList").innerHTML = cart.map((item, i) => {
    total += item.price;
    return `<div class="cart-item"><span><b>${item.name}</b><br>₹${item.price}</span>
            <button onclick="removeCart(${i})" style="color:red; background:none; border:none; cursor:pointer;">🗑️</button></div>`;
  }).join('');
  document.getElementById("totalBill").innerText = `Total: ₹${total}`;
}

function placeOrder() {
  const customerName = localStorage.getItem("customerName") || "Customer";
  if(cart.length === 0) return alert("Cart empty!");
  
  const now = new Date();
  const billInfo = document.getElementById("realBillDetails").innerText;
  const method = document.getElementById("payMethod").value;
  
  let list = `--- REAL INVOICE ---\n${billInfo}\nPayment: ${method}\n\nItems:\n`;
  let total = 0;
  cart.forEach((item, i) => {
    list += `${i+1}. ${item.name} - ₹${item.price}\n`;
    total += item.price;
  });
  list += `\nGRAND TOTAL: ₹${total}\n--------------------`;

  emailjs.send(SERVICE_ID, TEMPLATE_ID, { from_name: customerName, message: list })
    .then(() => {
      alert(`🎉 Congratulations ${customerName}!\n\n✅ Order Successful.\n📜 Bill ID: ${billInfo.split('\n')[0]}\n🚚 Arriving in 3-5 days.`);
      localStorage.removeItem("cart"); location.reload();
    });
}

function toggleWish(id){
  const index = wishlist.findIndex(p => p.id === id);
  if(index === -1) wishlist.push(products.find(p => p.id === id));
  else wishlist.splice(index, 1);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  updateUI(); showStore();
}

function addToCart(id){
  let item = products.find(p => p.id === id);
  cart.push({...item});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateUI(); 
}

function showWishlistPage() { showStore(wishlist); document.getElementById("wishlistHeader").classList.remove("hidden"); }
function showAllProducts() { showStore(products); document.getElementById("wishlistHeader").classList.add("hidden"); }
function removeCart(i) { cart.splice(i, 1); localStorage.setItem("cart", JSON.stringify(cart)); updateUI(); }
function openCart() { updateUI(); document.getElementById("cartSidebar").classList.add("open"); }
function closeCart() { document.getElementById("cartSidebar").classList.remove("open"); }
function searchItems() {
  const term = document.getElementById("searchBox").value.toLowerCase();
  showStore(products.filter(p => p.name.toLowerCase().includes(term)));
}
function logout() { localStorage.clear(); location.reload(); }
function toggleDark() { document.body.classList.toggle("dark"); }
window.onload = checkUser;
</script>
</body>
      </html>
