 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛍️ Datta & Ajay's Mega Store</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
  :root { --primary: #ff6f61; --secondary: #feb47b; --dark: #1a1a1a; --light: #fdf2f2; --success: #28a745; }
  
  body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--light); transition: 0.5s; color: #333; overflow-x: hidden; }
  .dark { background: var(--dark); color: white !important; }
  .dark .product, .dark .cart-sidebar { background: #222; color: white; border: 1px solid #444; }
  .hidden { display: none !important; }
  
  /* Header & Search */
  header { 
    background: linear-gradient(135deg, var(--primary), var(--secondary)); 
    padding: 20px; color: white; text-align: center; position: sticky; top: 0; z-index: 1000; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
  }
  .nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px 0; }
  .btn { 
    background: white; color: var(--primary); border: none; padding: 10px 20px; 
    border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
  
  .search-box { 
    width: 90%; max-width: 500px; padding: 12px 25px; border-radius: 30px; 
    border: none; outline: none; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  /* Products Grid */
  #products { 
    display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
    gap: 25px; padding: 30px; max-width: 1400px; margin: auto; 
  }
  .product { 
    background: white; padding: 20px; border-radius: 25px; text-align: center; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: 0.4s; position: relative;
  }
  .product:hover { transform: translateY(-10px); }
  .product img { width: 100%; height: 220px; object-fit: cover; border-radius: 20px; }
  
  .wishlist-heart { 
    position: absolute; top: 30px; right: 30px; font-size: 1.5rem; 
    cursor: pointer; color: #ccc; transition: 0.3s;
  }
  .wishlist-heart.active { color: #ff4757; }

  .add-btn { 
    background: var(--primary); color: white; border: none; padding: 12px; 
    border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px;
  }

  /* Side Cart Bar */
  .cart-sidebar { 
    position: fixed; top: 0; right: -400px; width: 350px; height: 100%; 
    background: white; z-index: 2001; transition: 0.5s; box-shadow: -5px 0 25px rgba(0,0,0,0.2);
    padding: 25px; display: flex; flex-direction: column;
  }
  .cart-sidebar.open { right: 0; }
  .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
  
  .cart-items-container { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
  .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; border-bottom: 1px solid #f9f9f9; padding-bottom: 8px; }
  
  .bill-footer { border-top: 2px solid #eee; padding-top: 15px; }

  /* Login Overlay */
  #loginOverlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: linear-gradient(135deg, var(--primary), var(--secondary)); 
    z-index: 9999; display: flex; justify-content: center; align-items: center; 
  }
  .login-box { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h1 style="color:var(--primary); margin-bottom: 5px;">Welcome! 🙏</h1>
    <p style="color: #666;">Datta & Ajay Mega Store</p>
    <input type="text" id="userNameInput" style="width:90%; padding:15px; margin:20px 0; border-radius:15px; border:2px solid #eee; text-align: center; font-size: 1rem;" placeholder="Apna Naam Likhein...">
    <button class="add-btn" onclick="saveUser()">Dukaan Mein Chalein 🛒</button>
  </div>
</div>

<header id="mainHeader" class="hidden">
  <h1 id="welcomeGreeting" style="margin: 0; font-size: 1.8rem;">🛒 Datta & Ajay Store</h1>
  <div class="nav-buttons">
    <button class="btn" onclick="toggleDark()">🌙 Mode</button>
    <button class="btn" onclick="alert('Your Wishlist is being updated!')">❤️ Wishlist (<span id="wishCount">0</span>)</button>
    <button class="btn" onclick="openCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
    <button class="btn" style="background: #333; color: white;" onclick="logout()">👋 Logout</button>
  </div>
  <input type="text" id="searchBox" class="search-box" onkeyup="searchItems()" placeholder="Saree, Watch, Shoes khojein...">
</header>

<main id="mainContent" class="hidden">
  <div id="products"></div>
</main>

<div id="cartSidebar" class="cart-sidebar">
  <div class="cart-header">
    <h2 style="margin:0;">My Cart 🛒</h2>
    <button onclick="closeCart()" style="background:none; border:none; font-size:2rem; cursor:pointer; color: var(--primary);">×</button>
  </div>
  <div id="cartItemsList" class="cart-items-container"></div>
  <div class="bill-footer">
    <h3 id="totalBill" style="margin-bottom: 15px;">Total: ₹0</h3>
    <p style="font-size: 0.9rem; color: #666;">Payment Method:</p>
    <select id="payMethod" class="add-btn" style="background:#f0f0f0; color:#333; margin-top:5px; margin-bottom:15px;">
      <option value="COD">Cash on Delivery (COD)</option>
      <option value="UPI">UPI / Online Payment</option>
    </select>
    <button class="add-btn" style="background: var(--success); font-size: 1.1rem; padding: 15px;" onclick="placeOrder()">Place Order 🚀</button>
  </div>
</div>

<script>
// --- CONFIGURATION ---
const SERVICE_ID = "service_lduofei"; 
const TEMPLATE_ID = "template_x85ytrq"; 
const PUBLIC_KEY = "mIOgOSr1AjeDPmz8L";
emailjs.init(PUBLIC_KEY);

// --- PRODUCT DATA ---
const products = [
  {id:1, name:"Premium T-Shirt", price:500, image:"https://www.freeiconspng.com/uploads/blank-t-shirt-png-16.jpg"},
  {id:2, name:"Sneaker Shoes", price:1500, image:"https://www.pngall.com/wp-content/uploads/5/Men-Shoes-PNG-Image-File.png"},
  {id:3, name:"Luxury Watch", price:2000, image:"https://i.postimg.cc/66k6BKX7/1805QM04-1.jpg"},
  {id:4, name:"Silk Saree", price:1499, image:"https://i.postimg.cc/jqGQHDzF/IMG-20260325-WA0001.jpg"},
  {id:5, name:"White Formal Shirt", price:299, image:"https://i.postimg.cc/L5bHPdY2/IMG-20260328-WA0044.jpg"},
  {id:6, name:"Round Sunglasses", price:450, image:"https://i.postimg.cc/9FKSqXMf/IMG-20260228-WA0071.jpg"},
  {id:7, name:"Smart Watch Pro", price:3500, image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400"},
  {id:8, name:"Gaming Mouse", price:1200, image:"https://images.unsplash.com/photo-1527814050087-379371549a28?w=400"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

// --- LOGIN LOGIC ---
function saveUser() {
  const name = document.getElementById("userNameInput").value.trim();
  if(name) { localStorage.setItem("customerName", name); checkUser(); }
  else { alert("Kripya apna naam likhein!"); }
}

function checkUser() {
  const savedName = localStorage.getItem("customerName");
  if(savedName) {
    document.getElementById("loginOverlay").classList.add("hidden");
    document.getElementById("mainHeader").classList.remove("hidden");
    document.getElementById("mainContent").classList.remove("hidden");
    document.getElementById("welcomeGreeting").innerText = `Namaste, ${savedName}! 🛒`;
    showStore();
    updateUI();
  }
}

// --- DISPLAY PRODUCTS ---
function showStore(items = products){
  const container = document.getElementById("products");
  container.innerHTML = items.map(p => {
    const isWish = wishlist.some(w => w.id === p.id);
    return `
      <div class="product">
        <span class="wishlist-heart ${isWish ? 'active' : ''}" onclick="toggleWish(${p.id})">❤️</span>
        <img src="${p.image}"> 
        <h3 style="margin: 10px 0;">${p.name}</h3> 
        <p style="font-weight:bold; color:var(--primary); font-size: 1.2rem;">₹${p.price}</p> 
        <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
      </div>`;
  }).join('');
}

// --- CART & WISHLIST LOGIC ---
function addToCart(id){
  let item = products.find(p => p.id === id);
  cart.push({...item, cartId: Date.now()});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateUI();
  alert(item.name + " Cart mein add ho gaya! ✅");
}

function toggleWish(id){
  const index = wishlist.findIndex(p => p.id === id);
  if(index === -1) { wishlist.push(products.find(p => p.id === id)); }
  else { wishlist.splice(index, 1); }
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  updateUI();
  showStore();
}

function updateUI() {
  document.getElementById("cartCount").innerText = cart.length;
  document.getElementById("wishCount").innerText = wishlist.length;
  
  let total = 0;
  document.getElementById("cartItemsList").innerHTML = cart.map((item, i) => {
    total += item.price;
    return `<div class="cart-item">
              <span><b>${item.name}</b><br><small>₹${item.price}</small></span>
              <button onclick="removeCart(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size: 1.2rem;">🗑️</button>
            </div>`;
  }).join('');
  document.getElementById("totalBill").innerText = `Total Bill: ₹${total}`;
}

function removeCart(i) { cart.splice(i, 1); localStorage.setItem("cart", JSON.stringify(cart)); updateUI(); }
function openCart() { document.getElementById("cartSidebar").classList.add("open"); }
function closeCart() { document.getElementById("cartSidebar").classList.remove("open"); }

// --- ATTRACTIVE PLACE ORDER LOGIC ---
function placeOrder() {
  const customerName = localStorage.getItem("customerName") || "Customer";
  if(cart.length === 0) return alert("Bhai, pehle cart mein kuch toh daalo! 🛒");

  const method = document.getElementById("payMethod").value;
  let itemsList = `Payment Method: ${method}\n\nOrder List:\n`;
  let total = 0;
  cart.forEach((item, i) => {
    itemsList += `${i+1}. ${item.name} - ₹${item.price}\n`;
    total += item.price;
  });
  itemsList += `\n💰 Total Bill: ₹${total}`;

  emailjs.send(SERVICE_ID, TEMPLATE_ID, { from_name: customerName, message: itemsList })
    .then(() => {
      // --- THE ATTRACTIVE SUCCESS ALERT ---
      alert(`🎉 Congratulations ${customerName}!\n\n` +
            `✅ Your order has been placed successfully.\n` +
            `🚚 Delivery Status: Your package will arrive in 3-5 business days.\n\n` +
            `Thank you for shopping with Datta & Ajay Mega Store! ❤️`);
      
      localStorage.removeItem("cart");
      location.reload();
    }, () => alert("Server error! Please try again later."));
}

function searchItems() {
  const term = document.getElementById("searchBox").value.toLowerCase();
  showStore(products.filter(p => p.name.toLowerCase().includes(term)));
}

function logout() { localStorage.clear(); location.reload(); }
function toggleDark() { document.body.classList.toggle("dark"); }
window.onload = checkUser;
</script>
</body>
  </html>
