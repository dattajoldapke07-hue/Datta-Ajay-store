<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛍️ Datta & Ajay's Mega Store</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
  :root { --primary: #ff6f61; --secondary: #feb47b; --dark: #1a1a1a; --light: #fdf2f2; --success: #28a745; }
  body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--light); transition: 0.5s; color: #333; overflow-x: hidden; }
  .dark { background: var(--dark); color: white !important; }
  .hidden { display: none !important; }

  header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 15px; color: white; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 10px 0; }
  .btn { background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
  .search-box { width: 85%; padding: 10px 20px; border-radius: 30px; border: none; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

  #products { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
  .product { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
  .product img { width: 100%; height: 150px; object-fit: cover; border-radius: 15px; }
  .add-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }

  /* SIDEBARS */
  .sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 320px; height: 100%; background: white; z-index: 2001; transition: 0.4s; box-shadow: -5px 0 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; color: #333; }
  .sidebar.open { right: 0; }
  .sb-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
  .sb-body { flex: 1; overflow-y: auto; padding: 15px; }

  /* ADMIN PANEL STYLING */
  .admin-card { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--primary); font-size: 0.8rem; }

  /* MODALS */
  #receiptModal, #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; display: flex; justify-content: center; align-items: center; }
  #receiptModal { background: rgba(0,0,0,0.8); display: none; }
  #loginOverlay { background: var(--primary); }
  .modal-box { background: white; width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; text-align: center; color: #333; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="modal-box">
    <h2 style="color:var(--primary);">Namaste! 🙏</h2>
    <input type="text" id="userNameInput" style="width:90%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd; text-align:center;" placeholder="Enter Name">
    <button class="add-btn" onclick="saveUser()">Chalein 🛒</button>
  </div>
</div>

<header id="mainHeader" class="hidden">
  <h3 id="welcomeGreeting" style="margin:0;">🛒 Datta & Ajay Store</h3>
  <div class="nav-buttons">
    <button class="btn" style="background:#333; color:white;" onclick="openAdmin()">🔑 Admin</button>
    <button class="btn" onclick="toggleDark()">🌙 Mode</button>
    <button class="btn" onclick="showWishlistPage()">❤️ Wishlist (<span id="wishCount">0</span>)</button>
    <button class="btn" onclick="openCart()" style="background:var(--primary); color:white;">🛒 Cart (<span id="cartCount">0</span>)</button>
  </div>
  <input type="text" id="searchBox" class="search-box" onkeyup="searchItems()" placeholder="Search Products...">
</header>

<main id="mainContent" class="hidden">
  <div id="wishlistHeader" class="hidden" style="text-align:center; padding:10px;">
    <button class="btn" onclick="showAllProducts()" style="background:var(--primary); color:white;">⬅️ Back to Store</button>
  </div>
  <div id="products"></div>
</main>

<div id="cartSidebar" class="sidebar">
  <div class="sb-header">
    <h3 style="margin:0;">My Cart 🛒</h3>
    <button onclick="closeCart()" style="border:none; background:none; font-size:2rem; cursor:pointer;">×</button>
  </div>
  <div id="cartItemsList" class="sb-body"></div>
  <div style="padding:20px; border-top:1px solid #eee;">
    <h3 id="totalBill" style="text-align:center; color:var(--primary);">Total: ₹0</h3>
    <button class="add-btn" style="background:var(--success);" onclick="placeOrder()">PLACE ORDER 🚀</button>
  </div>
</div>

<div id="adminSidebar" class="sidebar">
  <div class="sb-header">
    <h3 style="margin:0;">Admin Panel 🔑</h3>
    <button onclick="closeAdmin()" style="border:none; background:none; font-size:2rem; cursor:pointer;">×</button>
  </div>
  <div class="sb-body">
    <h4>Live Orders (Local)</h4>
    <div id="adminOrderList">No orders yet.</div>
    <hr>
    <h4>Add Product</h4>
    <input type="text" id="newPName" placeholder="Name" style="width:90%; margin-bottom:5px; padding:5px;">
    <input type="number" id="newPPrice" placeholder="Price" style="width:90%; margin-bottom:5px; padding:5px;">
    <button class="add-btn" onclick="adminAddProduct()">Add to Store</button>
  </div>
</div>

<div id="receiptModal">
  <div class="modal-box" style="border: 2px dashed #333;">
    <h2 style="color:var(--primary);">INVOICE</h2>
    <div id="receiptContent" style="text-align:left; font-size:0.9rem;"></div>
    <button class="add-btn" onclick="location.reload()">Close</button>
  </div>
</div>

<script>
const SERVICE_ID = "service_lduofei"; 
const TEMPLATE_ID = "template_x85ytrq"; 
const PUBLIC_KEY = "mIOgOSr1AjeDPmz8L";
emailjs.init(PUBLIC_KEY);

let products = JSON.parse(localStorage.getItem("storeProducts")) || [
  {id:1, name:"Premium T-Shirt", price:500, image:"https://www.freeiconspng.com/uploads/blank-t-shirt-png-16.jpg"},
  {id:2, name:"Sneaker Shoes", price:1500, image:"https://www.pngall.com/wp-content/uploads/5/Men-Shoes-PNG-Image-File.png"},
  {id:3, name:"Luxury Watch", price:2000, image:"https://i.postimg.cc/66k6BKX7/1805QM04-1.jpg"},
  {id:4, name:"Silk Saree", price:1499, image:"https://i.postimg.cc/jqGQHDzF/IMG-20260325-WA0001.jpg"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let allOrders = JSON.parse(localStorage.getItem("allOrders")) || [];

function saveUser() {
  const name = document.getElementById("userNameInput").value.trim();
  if(name) { localStorage.setItem("customerName", name); checkUser(); }
}

function checkUser() {
  const savedName = localStorage.getItem("customerName");
  if(savedName) {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainHeader").classList.remove("hidden");
    document.getElementById("mainContent").classList.remove("hidden");
    document.getElementById("welcomeGreeting").innerText = `Namaste, ${savedName}!`;
    showStore(); updateUI();
  }
}

function showStore(items = products){
  const container = document.getElementById("products");
  container.innerHTML = items.map(p => `
    <div class="product">
      <img src="${p.image || 'https://via.placeholder.com/150'}"> 
      <h4>${p.name}</h4> 
      <p style="color:var(--primary); font-weight:bold;">₹${p.price}</p> 
      <button class="add-btn" onclick="addToCart(${p.id})">Add</button>
    </div>`).join('');
}

function addToCart(id){
  let item = products.find(p => p.id === id);
  cart.push({...item});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateUI();
}

function updateUI() {
  document.getElementById("cartCount").innerText = cart.length;
  document.getElementById("wishCount").innerText = wishlist.length;
  let total = 0;
  document.getElementById("cartItemsList").innerHTML = cart.map((item, i) => {
    total += item.price;
    return `<div class="cart-item"><span><b>${item.name}</b><br>₹${item.price}</span>
            <button onclick="removeCart(${i})" style="color:red; background:none; border:none;">🗑️</button></div>`;
  }).join('');
  document.getElementById("totalBill").innerText = `Total: ₹${total}`;
}

// --- ADMIN LOGIC ---
function openAdmin() {
  let pass = prompt("Enter Admin Password:");
  if(pass === "1234") {
    document.getElementById("adminSidebar").classList.add("open");
    renderAdminOrders();
  } else { alert("Wrong Password!"); }
}

function renderAdminOrders() {
  const list = document.getElementById("adminOrderList");
  list.innerHTML = allOrders.map(o => `
    <div class="admin-card">
      <b>ID:</b> ${o.id}<br><b>User:</b> ${o.user}<br><b>Total:</b> ₹${o.total}
    </div>`).join('');
}

function adminAddProduct() {
  const name = document.getElementById("newPName").value;
  const price = document.getElementById("newPPrice").value;
  if(name && price) {
    products.push({id: Date.now(), name, price: parseInt(price)});
    localStorage.setItem("storeProducts", JSON.stringify(products));
    showStore(); alert("Product Added!");
  }
}

function placeOrder() {
  if(cart.length === 0) return;
  const orderID = "DA-" + Math.floor(Math.random()*10000);
  const total = cart.reduce((s,i)=>s+i.price,0);
  const newOrder = {id: orderID, user: localStorage.getItem("customerName"), total: total};
  
  allOrders.push(newOrder);
  localStorage.setItem("allOrders", JSON.stringify(allOrders));

  document.getElementById("receiptContent").innerHTML = `ID: ${orderID}<br>Total: ₹${total}<br>Delivery: 3-5 Days`;
  document.getElementById("receiptModal").style.display = "flex";
  localStorage.removeItem("cart");
}

function closeAdmin() { document.getElementById("adminSidebar").classList.remove("open"); }
function openCart() { document.getElementById("cartSidebar").classList.add("open"); }
function closeCart() { document.getElementById("cartSidebar").classList.remove("open"); }
function logout() { localStorage.clear(); location.reload(); }
function toggleDark() { document.body.classList.toggle("dark"); }
function searchItems() {
  const term = document.getElementById("searchBox").value.toLowerCase();
  showStore(products.filter(p => p.name.toLowerCase().includes(term)));
}
window.onload = checkUser;
</script>
</body>
    </html>
