<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🛍️ Datta & Ajay's Mega Store</title>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
  :root { --primary: #ff6f61; --secondary: #feb47b; --dark: #1a1a1a; --light: #fdf2f2; --success: #28a745; }
  body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--light); transition: 0.5s; color: #333; overflow-x: hidden; }
  .dark { background: var(--dark); color: white !important; }
  .hidden { display: none !important; }

  header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 15px; color: white; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 10px 0; }
  .btn { background: white; color: var(--primary); border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
  .search-box { width: 85%; padding: 10px 20px; border-radius: 30px; border: none; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

  #products { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
  .product { background: white; padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; transition: 0.3s; }
  .product img { width: 100%; height: 150px; object-fit: cover; border-radius: 15px; }
  .add-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }

  /* SIDEBARS */
  .sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 330px; height: 100%; background: white; z-index: 2001; transition: 0.4s; box-shadow: -5px 0 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; color: #333; }
  .sidebar.open { right: 0; }
  .sb-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
  .sb-body { flex: 1; overflow-y: auto; padding: 15px; }

  /* PAYMENT CARDS */
  .pay-card { display: flex; align-items: center; background: #f8f8f8; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 2px solid transparent; cursor: pointer; }
  .pay-card input { margin-right: 10px; }
  .pay-card.active { border-color: var(--primary); background: #fff5f4; }

  /* INVOICE */
  #receiptModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; padding: 10px; }
  .invoice-box { background: #fff; width: 100%; max-width: 340px; padding: 20px; border-radius: 4px; font-family: 'Courier New', Courier, monospace; color: #000; }
  
  #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 10000; display: flex; justify-content: center; align-items: center; }
  .login-box { background: white; padding: 30px; border-radius: 25px; text-align: center; width: 85%; max-width: 300px; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2 style="color:var(--primary);">Welcome! 🙏</h2>
    <input type="text" id="userNameInput" style="width:90%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd; text-align:center;" placeholder="Your Name...">
    <button class="add-btn" onclick="saveUser()">Dukaan Mein Chalein 🛒</button>
  </div>
</div>

<header id="mainHeader" class="hidden">
  <h3 id="welcomeGreeting" style="margin:0;">🛒 Datta & Ajay Store</h3>
  <div class="nav-buttons">
    <button class="btn" style="background:#333; color:white;" onclick="openAdmin()">🔑 Admin</button>
    <button class="btn" onclick="toggleDark()">🌙 Mode</button>
    <button class="btn" onclick="openCart()" style="background:var(--primary); color:white;">🛒 Cart (<span id="cartCount">0</span>)</button>
  </div>
  <input type="text" id="searchBox" class="search-box" onkeyup="searchItems()" placeholder="Saree, Watch, Shoes...">
</header>

<main id="mainContent" class="hidden">
  <div id="products"></div>
</main>

<div id="cartSidebar" class="sidebar">
  <div class="sb-header"><h3>My Cart 🛒</h3><button onclick="closeCart()" style="border:none; background:none; font-size:2rem;">×</button></div>
  <div id="cartItemsList" class="sb-body"></div>
  <div style="padding:15px; border-top:1px solid #eee; background:white;">
    <h3 id="totalBill" style="text-align:center; color:var(--primary); margin-bottom:10px;">Total: ₹0</h3>
    <p style="font-size:0.8rem; font-weight:bold; margin-bottom:5px;">Payment Method:</p>
    <label class="pay-card active" id="cardCod">
      <input type="radio" name="payOption" value="COD" checked onclick="selectPay('cardCod')"> 💵 Cash on Delivery
    </label>
    <label class="pay-card" id="cardUpi">
      <input type="radio" name="payOption" value="UPI" onclick="selectPay('cardUpi')"> 📱 UPI / Online
    </label>
    <button class="add-btn" style="background:var(--success); font-size:1.1rem;" onclick="placeOrder()">PLACE ORDER 🚀</button>
  </div>
</div>

<div id="adminSidebar" class="sidebar">
  <div class="sb-header"><h3>Admin Panel 🔑</h3><button onclick="closeAdmin()" style="border:none; background:none; font-size:2rem;">×</button></div>
  <div class="sb-body">
    <h4>Add New Product</h4>
    <input type="text" id="adminPName" style="width:90%; padding:8px; margin-bottom:5px;" placeholder="Product Name">
    <input type="number" id="adminPPrice" style="width:90%; padding:8px; margin-bottom:5px;" placeholder="Price (₹)">
    <input type="text" id="adminPImg" style="width:90%; padding:8px; margin-bottom:5px;" placeholder="Image URL">
    <button class="add-btn" onclick="adminAddProduct()">Add Product ✅</button>
    <hr>
    <h4>Orders</h4>
    <div id="adminOrderList" style="font-size: 0.7rem;"></div>
  </div>
</div>

<div id="receiptModal">
  <div class="invoice-box">
    <h3 style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px;">INVOICE</h3>
    <div id="invContent" style="font-size:0.85rem; line-height:1.6; margin:15px 0;"></div>
    <p style="text-align:center; font-size:0.7rem; border-top:1px dashed #000; padding-top:10px;">Thank You! Delivery in 3-5 days.</p>
    <button class="add-btn" onclick="location.reload()">DONE</button>
  </div>
</div>

<script>
const SERVICE_ID = "service_lduofei"; 
const TEMPLATE_ID = "template_x85ytrq"; 
const PUBLIC_KEY = "mIOgOSr1AjeDPmz8L";
emailjs.init(PUBLIC_KEY);

const defaultProducts = [
  {id:101, name:"Premium T-Shirt", price:500, image:"https://www.freeiconspng.com/uploads/blank-t-shirt-png-16.jpg"},
  {id:102, name:"Sneaker Shoes", price:1500, image:"https://www.pngall.com/wp-content/uploads/5/Men-Shoes-PNG-Image-File.png"},
  {id:103, name:"Luxury Watch", price:2000, image:"https://i.postimg.cc/66k6BKX7/1805QM04-1.jpg"},
  {id:104, name:"Silk Saree", price:1499, image:"https://i.postimg.cc/jqGQHDzF/IMG-20260325-WA0001.jpg"},
  {id:105, name:"Formal White Shirt", price:299, image:"https://i.postimg.cc/L5bHPdY2/IMG-20260328-WA0044.jpg"},
  {id:106, name:"Round Sunglasses", price:450, image:"https://i.postimg.cc/9FKSqXMf/IMG-20260228-WA0071.jpg"},
  {id:107, name:"Smart Watch Pro", price:3500, image:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400"},
  {id:108, name:"Gaming Mouse", price:1200, image:"https://images.unsplash.com/photo-1527814050087-379371549a28?w=400"},
  {id:31,name:"Watch",price:2000,category:"accessories",image:"https://i.postimg.cc/66k6BKX7/1805QM04-1.jpg"},
{id:32,name:"Sunglasses",price:500,category:"accessories",image:"https://i.postimg.cc/9FKSqXMf/IMG-20260228-WA0071.jpg"},
{id:33,name:"Backpack",price:1000,category:"accessories",image:"https://images.unsplash.com/photo-1509762774605-f07235a08f1f"},
{id:34,name:"Wallet",price:700,category:"accessories",image:"https://images.unsplash.com/photo-1585386959984-a41552262b0c"},
{id:35,name:"Belt",price:400,category:"accessories",image:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba6"},
{id:36,name:"Cap",price:300,category:"accessories",image:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{id:37,name:"Perfume",price:1500,category:"accessories",image:"https://images.unsplash.com/photo-1585386959984-a41552262b0c"},
{id:38,name:"Bracelet",price:500,category:"accessories",image:"https://images.unsplash.com/photo-1520975916090-3105956dac38"},
{id:39,name:"Necklace",price:900,category:"accessories",image:"https://images.unsplash.com/photo-1529634895117-1f7e3a66c1a0"},
{id:40,name:"Handbag",price:1300,category:"accessories",image:"https://images.unsplash.com/photo-1584917865442-de89df76afd3"}

];

let products = JSON.parse(localStorage.getItem("storeProducts")) || defaultProducts;
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let allOrders = JSON.parse(localStorage.getItem("allOrders")) || [];

function saveUser() {
  const name = document.getElementById("userNameInput").value.trim();
  if(name) { localStorage.setItem("customerName", name); checkUser(); }
}

function checkUser() {
  if(localStorage.getItem("customerName")) {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainHeader").classList.remove("hidden");
    document.getElementById("mainContent").classList.remove("hidden");
    document.getElementById("welcomeGreeting").innerText = `Namaste, ${localStorage.getItem("customerName")}!`;
    showStore(); updateUI();
  }
}

function showStore(items = products){
  document.getElementById("products").innerHTML = items.map(p => `
    <div class="product">
      <img src="${p.image || 'https://via.placeholder.com/150'}"> 
      <h4>${p.name}</h4><p style="color:var(--primary); font-weight:bold;">₹${p.price}</p> 
      <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
    </div>`).join('');
}

function selectPay(id) {
  document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function adminAddProduct() {
  const name = document.getElementById("adminPName").value;
  const price = document.getElementById("adminPPrice").value;
  const img = document.getElementById("adminPImg").value;
  if(name && price) {
    products.push({id: Date.now(), name, price: parseInt(price), image: img});
    localStorage.setItem("storeProducts", JSON.stringify(products));
    showStore(); alert("Added!");
  }
}

function addToCart(id){
  cart.push({...products.find(p => p.id === id)});
  localStorage.setItem("cart", JSON.stringify(cart));
  updateUI();
}

function updateUI() {
  document.getElementById("cartCount").innerText = cart.length;
  let total = 0;
  document.getElementById("cartItemsList").innerHTML = cart.map((item, i) => {
    total += item.price;
    return `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${item.name}</span><span>₹${item.price}</span></div>`;
  }).join('');
  document.getElementById("totalBill").innerText = `Total: ₹${total}`;
}

function placeOrder() {
  if(cart.length === 0) return alert("Cart empty!");
  const orderID = "INV-" + Math.floor(Math.random()*900000 + 100000);
  const now = new Date();
  const method = document.querySelector('input[name="payOption"]:checked').value;
  const total = cart.reduce((s,i)=>s+i.price,0);
  
  allOrders.unshift({id: orderID, user: localStorage.getItem("customerName"), total: total, date: now.toLocaleString()});
  localStorage.setItem("allOrders", JSON.stringify(allOrders));

  document.getElementById("invContent").innerHTML = `
    <b>Order ID:</b> ${orderID}<br>
    <b>Customer:</b> ${localStorage.getItem("customerName")}<br>
    <b>Date:</b> ${now.toLocaleDateString()}<br>
    <b>Time:</b> ${now.toLocaleTimeString()}<br>
    <b>Payment:</b> ${method}<br><br>
    <b>Total Bill: ₹${total}</b>
  `;
  
  emailjs.send(SERVICE_ID, TEMPLATE_ID, { from_name: localStorage.getItem("customerName"), message: `Order ${orderID} placed via ${method}. Total: ₹${total}` })
    .then(() => {
      document.getElementById("receiptModal").style.display = "flex";
      localStorage.removeItem("cart");
    });
}

function openAdmin() {
  if(prompt("Password:") === "1234") {
    document.getElementById("adminSidebar").classList.add("open");
    document.getElementById("adminOrderList").innerHTML = allOrders.map(o => `<div>${o.id} - ₹${o.total}</div>`).join('');
  }
}

function closeAdmin() { document.getElementById("adminSidebar").classList.remove("open"); }
function openCart() { document.getElementById("cartSidebar").classList.add("open"); }
function closeCart() { document.getElementById("cartSidebar").classList.remove("open"); }
function toggleDark() { document.body.classList.toggle("dark"); }
function searchItems() {
  const term = document.getElementById("searchBox").value.toLowerCase();
  showStore(products.filter(p => p.name.toLowerCase().includes(term)));
}
window.onload = checkUser;
</script>
</body>
        </html>
