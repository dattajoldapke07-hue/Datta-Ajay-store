<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datta & Ajay's Store</title>
<style>
  /* Basic Reset */
  body { 
    margin: 0; 
    font-family: 'Segoe UI', Arial, sans-serif; 
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb); 
    min-height: 100vh; 
    transition: 0.5s;
  }
  .dark { background: #1a1a1a; color: white; }

  /* Header Design - Mobile Responsive */
  header {
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
    padding: 15px;
    color: white;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  header h1 { margin: 0 0 10px 0; font-size: 1.5rem; }

  .nav-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  .nav-buttons a { text-decoration: none; }

  .btn {
    background: white;
    color: #333;
    border: none;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    transition: 0.3s;
  }
  .btn:hover { transform: scale(1.05); background: #eee; }
  .admin-btn { background: #333; color: white; }

  /* Products Grid */
  #products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }

  .product {
    background: white;
    color: #333;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
  }
  .product:hover { transform: translateY(-5px); }
  .product img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; }
  .product h3 { font-size: 1rem; margin: 10px 0 5px; }
  .product p { font-weight: bold; color: #ff6f61; margin: 5px 0; }
  
  .add-btn {
    background: #ff6f61;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
  }
  .wish-btn {
    background: none;
    border: none;
    color: #ff3b2e;
    cursor: pointer;
    margin-top: 5px;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<header>
  <h1>🛒 Datta & Ajay Store</h1>
  <div class="nav-buttons">
    <a href="admin.html"><button class="btn admin-btn">🔑 Admin</button></a>
    <button class="btn" onclick="toggleDark()">🌙 Dark</button>
    <a href="wishlist.html"><button class="btn">❤️ Wishlist</button></a>
    <a href="cart.html"><button class="btn">🛒 Cart (<span id="cartCount">0</span>)</button></a>
  </div>
</header>

<section id="products"></section>

<script>
// Products Array
const products = [
  {id:1,name:"T-Shirt",price:500,image:"https://www.freeiconspng.com/uploads/blank-t-shirt-png-16.jpg"},
  {id:2,name:"Shoes",price:1500,image:"https://www.pngall.com/wp-content/uploads/5/Men-Shoes-PNG-Image-File.png"},
  {id:3,name:"Watch",price:2000,image:"https://i.postimg.cc/66k6BKX7/1805QM04-1.jpg"},
  {id:4,name:"Backpack",price:800,image:"https://images.unsplash.com/photo-1509762774605-f07235a08f1f"},
  {id:5,name:"Premium Cotton Shirt",price:699,image:"https://i.postimg.cc/mD7ZKp5t/IMG-20260228-WA0050.jpg"},
  {id:6,name:"Round Sunglass",price:450,image:"https://i.postimg.cc/9FKSqXMf/IMG-20260228-WA0071.jpg"},
  {id:7,name:"White Shirt",price:299,image:"https://i.postimg.cc/L5bHPdY2/IMG-20260328-WA0044.jpg"},
  {id:8,name:"Silk Saree",price:1499,image:"https://i.postimg.cc/jqGQHDzF/IMG-20260325-WA0001.jpg"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

// Function to Show Products
function showProducts(){
  const container = document.getElementById("products");
  if(!container) return;
  
  container.innerHTML = "";
  products.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        <button class="wish-btn" onclick="addToWishlist(${p.id})">❤️ Add Wishlist</button>
      </div>`;
  });
  updateCartCount();
}

function addToCart(id){
  let item = products.find(p=>p.id===id);
  let exist = cart.find(c=>c.id===id);
  if(exist) {
    exist.qty += 1;
  } else {
    cart.push({...item, qty: 1});
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert("Added to Cart ✅");
}

function updateCartCount(){
  let countElement = document.getElementById("cartCount");
  if(countElement) countElement.innerText = cart.length;
}

function addToWishlist(id){
  let item = products.find(p=>p.id===id);
  if(!wishlist.find(w=>w.id===id)) {
    wishlist.push(item);
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
    alert("Added to Wishlist ❤️");
  } else {
    alert("Already in Wishlist!");
  }
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

// Window load pe call karein
window.onload = showProducts;
</script>

</body>
    </html>
