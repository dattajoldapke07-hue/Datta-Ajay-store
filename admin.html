<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
  body { font-family: Arial; background: #f0f2f5; padding: 20px; }
  .header { background: #333; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .order-card { background: white; margin-bottom: 15px; padding: 20px; border-radius: 12px; border-left: 6px solid #28a745; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .cust-info { background: #f9f9f9; padding: 10px; border-radius: 8px; margin: 10px 0; }
  .item-list { font-size: 0.9rem; color: #666; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  .total { color: #d9534f; font-weight: bold; font-size: 1.2rem; }
  .empty { text-align: center; margin-top: 100px; color: #999; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Store Sales Dashboard</h1>
  <div>
    <button onclick="localStorage.removeItem('allOrders'); location.reload();" style="background:#dc3545; color:white; border:none; padding:10px; border-radius:6px; cursor:pointer;">Clear All History</button>
    <a href="index.html" style="color:white; margin-left:15px; text-decoration:none;">Logout 🏠</a>
  </div>
</div>

<div id="display"></div>

<script>
  if (document.referrer === "" || !document.referrer.includes("index.html")) {
    window.location.href = "index.html";
  }

  function load() {
    const box = document.getElementById("display");
    let orders = JSON.parse(localStorage.getItem("allOrders")) || [];

    if (orders.length === 0) {
      box.innerHTML = "<div class='empty'><h2>No Orders Found</h2><p>Your sales pipeline is currently empty.</p></div>";
      return;
    }

    orders.reverse().forEach(o => {
      let items = o.items.map(i => `${i.name} (x${i.qty})`).join(", ");
      box.innerHTML += `
        <div class="order-card">
          <div style="display:flex; justify-content:space-between; color:#888; font-size:0.85rem;">
            <strong>Order ID: ${o.id}</strong>
            <span>${o.date} | ${o.time}</span>
          </div>
          <div class="cust-info">
            <p style="margin:0;">👤 <b>Customer:</b> ${o.customer}</p>
            <p style="margin:5px 0 0 0;">📞 <b>Phone:</b> ${o.mobile}</p>
          </div>
          <div class="item-list">🛒 <b>Items:</b> ${items}</div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>Payment: <b>${o.payment}</b></span>
            <span class="total">Total: ₹${o.total}</span>
          </div>
        </div>`;
    });
  }
  window.onload = load;
</script>
</body>
</html>
