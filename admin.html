<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Analytics - Admin Only</title>
<style>
  body { font-family: Arial; background: #f4f7f6; padding: 20px; }
  .header { background: #333; color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
  .order-card { background: white; margin-top: 15px; padding: 20px; border-radius: 10px; border-left: 5px solid #28a745; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .empty-state { text-align: center; margin-top: 80px; color: #777; }
  .btn-clear { background: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Store Sales Analytics</h1>
  <div>
    <button class="btn-clear" onclick="clearData()">Clear All Records</button>
    <a href="index.html" style="color:white; margin-left:15px; text-decoration:none;">🏠 Logout</a>
  </div>
</div>

<div id="orderDisplay"></div>

<script>
  // Simple check: Agar user direct link se aaya hai toh wapas bhej do
  if (document.referrer === "" || !document.referrer.includes("index.html")) {
    alert("Please access through Admin Login on the Home Page.");
    window.location.href = "index.html";
  }

  function loadOrders() {
    const display = document.getElementById("orderDisplay");
    let orders = JSON.parse(localStorage.getItem("allOrders")) || [];

    if (orders.length === 0) {
      display.innerHTML = `
        <div class="empty-state">
          <img src="https://cdn-icons-png.flaticon.com/512/11329/11329073.png" width="100" style="opacity: 0.3;">
          <h2 style="margin-top: 20px;">No Orders Found</h2>
          <p>Your sales pipeline is currently empty. Orders will appear here once checkout is complete.</p>
        </div>`;
      return;
    }

    display.innerHTML = "";
    orders.reverse().forEach(order => {
      let itemsList = order.items.map(i => `${i.name} (x${i.qty})`).join(", ");
      display.innerHTML += `
        <div class="order-card">
          <div style="display:flex; justify-content:space-between;">
            <strong>Order ID: ${order.id}</strong>
            <span>${order.date}</span>
          </div>
          <p>Items: <i>${itemsList}</i></p>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>Payment: <b>${order.payment}</b></span>
            <span style="color:#d9534f; font-weight:bold;">Total: ₹${order.total}</span>
          </div>
        </div>`;
    });
  }

  function clearData() {
    if(confirm("Delete all sales history?")) {
      localStorage.removeItem("allOrders");
      loadOrders();
    }
  }

  window.onload = loadOrders;
</script>
</body>
</html>
