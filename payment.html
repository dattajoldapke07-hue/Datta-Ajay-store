<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invoice</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f7f6;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.invoice-box {
  background:white;
  padding:25px;
  width:95%;
  max-width:400px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.header {
  text-align:center;
  border-bottom:2px dashed #ccc;
  padding-bottom:10px;
}

.header h2 {
  margin:0;
  color:#ff6f61;
}

.details {
  margin:15px 0;
  font-size:14px;
}

.items {
  margin-top:10px;
}

.item {
  display:flex;
  justify-content:space-between;
  font-size:14px;
  padding:5px 0;
  border-bottom:1px solid #eee;
}

.total {
  margin-top:10px;
  font-weight:bold;
  font-size:16px;
  text-align:right;
}

.footer {
  margin-top:15px;
  text-align:center;
  font-size:12px;
  border-top:2px dashed #ccc;
  padding-top:10px;
}

.btn {
  margin-top:15px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.view-btn { background:#007bff; color:white; }
.home-btn { background:#333; color:white; }
</style>
</head>

<body>

<div class="invoice-box">

  <div class="header">
    <h2>Datta & Ajay Store</h2>
    <p>🧾 Invoice Receipt</p>
  </div>

  <div class="details" id="invoiceDetails"></div>

  <div class="items" id="invoiceItems"></div>

  <div class="total" id="invoiceTotal"></div>

  <div class="footer">
    Thank you for shopping! ❤️ <br>
    Delivery in 3-5 days
  </div>

  <button class="btn view-btn" onclick="window.location.href='index.html'">
    🛍️ Back to Store
  </button>

</div>

<script>
let method = localStorage.getItem("paymentMethod");
let cust = JSON.parse(localStorage.getItem("tempCustomer")) || { name: "Guest", phone: "N/A" };
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
let orderId = "#ORD" + Math.floor(Math.random() * 10000);

// DETAILS
document.getElementById("invoiceDetails").innerHTML = `
  <b>Order ID:</b> ${orderId}<br>
  <b>Name:</b> ${cust.name}<br>
  <b>Mobile:</b> ${cust.phone}<br>
  <b>Date:</b> ${new Date().toLocaleDateString()}<br>
  <b>Time:</b> ${new Date().toLocaleTimeString()}<br>
  <b>Payment:</b> ${method}
`;

// ITEMS
let itemsHTML = "";
cart.forEach(i => {
  itemsHTML += `
    <div class="item">
      <span>${i.name} x ${i.qty}</span>
      <span>₹${i.price * i.qty}</span>
    </div>
  `;
});
document.getElementById("invoiceItems").innerHTML = itemsHTML;

// TOTAL
document.getElementById("invoiceTotal").innerText = "Total: ₹" + total;

// SAVE ORDER
if (cart.length > 0) {
  let orderData = {
    id: orderId,
    customer: cust.name,
    mobile: cust.phone,
    date: new Date().toLocaleString(),
    items: cart,
    total: total,
    payment: method
  };

  let allOrders = JSON.parse(localStorage.getItem("allOrders")) || [];
  allOrders.push(orderData);
  localStorage.setItem("allOrders", JSON.stringify(allOrders));

  let myOrders = JSON.parse(localStorage.getItem("myOrders")) || [];
  myOrders.push(orderData);
  localStorage.setItem("myOrders", JSON.stringify(myOrders));

  localStorage.removeItem("cart");
  localStorage.removeItem("tempCustomer");
}
</script>

</body>
</html>
