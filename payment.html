<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>
<style>
  /* Sirf itna hi CSS rakhein, extra codes ko delete kar dein */
  body { 
    margin: 0; font-family: Arial; 
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb); 
    text-align: center; color: white; padding: 20px;
  }
  .payment-container {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    padding: 20px; border-radius: 20px;
    display: inline-block; width: 90%; max-width: 400px;
  }
  .method-box {
    background: white; color: #333; margin: 15px 0;
    padding: 15px; border-radius: 15px; text-align: left;
  }
  input {
    width: 100%; padding: 10px; margin: 10px 0;
    border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
  }
  .pay-btn {
    width: 100%; padding: 12px; background: #ff6f61;
    color: white; border: none; border-radius: 8px;
    cursor: pointer; font-weight: bold;
  }
  .cod-btn { background: #28a745; }
</style>
</head>
<body>

<div class="payment-container">
  <h2>Payment Method 💳</h2>

  <div class="method-box">
    <strong>UPI Payment</strong>
    <input type="text" id="upiId" placeholder="Enter UPI ID (e.g. name@upi)">
    <button class="pay-btn" onclick="checkUPI()">Pay Now</button>
  </div>

  <div class="method-box">
    <strong>Card Payment</strong>
    <input type="text" placeholder="Card Number">
    <button class="pay-btn" onclick="proceed('Card')">Pay Now</button>
  </div>

  <div class="method-box">
    <button class="pay-btn cod-btn" onclick="proceed('COD')">Cash on Delivery</button>
  </div>
</div>

<script>
  function checkUPI() {
    let val = document.getElementById("upiId").value;
    if (!val.includes("@")) {
      alert("Invalid UPI ID");
      return;
    }
    proceed('UPI');
  }

  function proceed(method) {
    localStorage.setItem("paymentMethod", method);
    window.location.href = "success.html";
  }
</script>
</body>
</html>
