<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🛒 Cart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>My Cart</h1>
  <a href="index.html"><button>🏠 Back to Store</button></a>
</header>

<section id="cartItems"></section>
<a href="payment.html"><button style="margin:20px;padding:10px 20px;">Proceed to Payment</button></a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const container = document.getElementById("cartItems");

if(cart.length === 0){
    container.innerHTML = "<p>Your cart is empty 😢</p>";
}else{
    cart.forEach(item => {
        const div = document.createElement("div");
        div.classList.add("cart-item");
        div.innerHTML = `<h3>${item.name} x ${item.qty}</h3><p>₹${item.price*item.qty}</p>`;
        container.appendChild(div);
    });
}
</script>
</body>
</html>
