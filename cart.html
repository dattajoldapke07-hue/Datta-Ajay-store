<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🛒 Cart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="text-align:center; margin-top:20px;">🛒 Your Cart</h2>
<div id="cartItems" style="text-align:center;"></div>
<div style="text-align:center; margin-top:20px;">
  <button onclick="checkout()" style="padding:10px 20px;">Proceed to Payment</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showCart(){
  const container = document.getElementById("cartItems");
  container.innerHTML = "";
  if(cart.length === 0){
    container.innerHTML = "<p>Cart is empty</p>";
    return;
  }
  cart.forEach(i => {
    container.innerHTML += `<p>${i.name} x ${i.qty} = ₹${i.price * i.qty}</p>`;
  });
}
showCart();

function checkout(){
  if(cart.length === 0){ alert("Cart empty!"); return; }
  window.location.href = "payment.html";
}
</script>

</body>
</html></body>
</html>
